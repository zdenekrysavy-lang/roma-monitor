name: roma-news-digest

on:
  # Režim A (placené Anthropic API) – plánované spouštění je VYPNUTÉ, aby
  # bez vyplněných secrets (ANTHROPIC_API_KEY, SMTP_*) workflow 2× denně nepadal.
  # Až budeš chtít režim A, doplň secrets a odkomentuj schedule níže.
  #schedule:
  #  # Časy jsou v UTC. 05:00 UTC ≈ 07:00 Praha (léto) / 06:00 (zima)
  #  - cron: "0 5 * * *"
  #  # 15:00 UTC ≈ 17:00 Praha (léto) / 16:00 (zima)
  #  - cron: "0 15 * * *"
  workflow_dispatch: {}   # umožní ruční spuštění z webu GitHubu

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalace závislostí
        run: pip install -r requirements.txt

      - name: Spuštění přehledu
        run: python main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL:      ${{ secrets.CLAUDE_MODEL }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
